<script>
    let datetxt = "JULY 14";
    let charArrDate = datetxt.split('');
    let currentIndex = 0;
    let date__of__birth = document.querySelector(".date__of__birth span");
    setTimeout(function () {
        timeDatetxt = setInterval(function () {
            if (currentIndex < charArrDate.length) {
                date__of__birth.textContent += charArrDate[currentIndex];
                currentIndex++;
            }
            else {
                let i = document.createElement("i");
                i.className = "fa-solid fa-star"
                document.querySelector(".date__of__birth").prepend(i)
                document.querySelector(".date__of__birth").appendChild(i.cloneNode(true))
                clearInterval(timeDatetxt)
            }
        }, 100)
    }, 12000)



    let mailBox = document.querySelector('.mail')
    let boxmail = document.querySelector('.boxMail')
    var close = document.querySelector('.fa-xmark')
    mailBox.onclick = function () {
        mailBox.classList.toggle('active')
        boxmail.classList.add('active')
    }

    close.addEventListener('click', function () {
        boxmail.classList.remove('active')
    })

    // --- 3D Page Flip Photo Album Script ---
    const albumImages = [
        "images/drive_photo1.jpeg",
        "images/drive_photo2.jpeg",
        "images/drive_photo3.jpeg",
        "images/drive_photo4.jpeg",
        "images/drive_photo5.jpeg",
        "images/drive_photo6.jpeg",
        "images/drive_photo7.jpeg",
        "images/drive_photo8.jpeg",
        "images/drive_photo9.jpeg",
        "images/drive_photo10.jpeg",
        "images/drive_photo11.jpeg",
        "images/drive_photo12.jpeg",
        "images/drive_photo13.jpeg",
        "images/drive_photo14.jpeg",
        "images/drive_photo15.jpeg"
    ];
    
    // Preload images into memory to ensure 60 FPS and prevent flickering
    albumImages.forEach(src => {
        const img = new Image();
        img.src = src;
    });

    let currentImgIdx = 0;
    const activeImgElement = document.getElementById('album-active-img');
    const flipOverlay = document.getElementById('album-flip-overlay');
    let isFlipping = false;

    function triggerPageTurn() {
        if (isFlipping) return;
        isFlipping = true;

        const nextImgIdx = (currentImgIdx + 1) % albumImages.length;
        const currentSrc = albumImages[currentImgIdx];
        const nextSrc = albumImages[nextImgIdx];

        flipOverlay.innerHTML = '';

        // Left static half
        const leftPage = document.createElement('div');
        leftPage.className = 'flip-page-left';
        const leftImg = document.createElement('img');
        leftImg.src = nextSrc;
        leftPage.appendChild(leftImg);
        
        // Right static half
        const rightPage = document.createElement('div');
        rightPage.className = 'flip-page-right';
        const rightImg = document.createElement('img');
        rightImg.src = nextSrc;
        rightPage.appendChild(rightImg);

        // Center 3D flipping sheet
        const flipSheet = document.createElement('div');
        flipSheet.className = 'flip-sheet';

        // Front face of flipping page (current image right-half)
        const sheetFront = document.createElement('div');
        sheetFront.className = 'sheet-face sheet-front';
        const frontImg = document.createElement('img');
        frontImg.src = currentSrc;
        sheetFront.appendChild(frontImg);

        // Back face of flipping page (next image left-half, mirrored)
        const sheetBack = document.createElement('div');
        sheetBack.className = 'sheet-face sheet-back';
        const backImg = document.createElement('img');
        backImg.src = nextSrc;
        sheetBack.appendChild(backImg);

        flipSheet.appendChild(sheetFront);
        flipSheet.appendChild(sheetBack);

        flipOverlay.appendChild(leftPage);
        flipOverlay.appendChild(rightPage);
        flipOverlay.appendChild(flipSheet);

        // Show overlay, hide active element
        flipOverlay.style.display = 'block';
        activeImgElement.style.opacity = '0';

        // Slow transition triggering
        setTimeout(() => {
            flipSheet.classList.add('do-flip');
        }, 50);

        // End of page turn transition
        setTimeout(() => {
            activeImgElement.src = nextSrc;
            activeImgElement.style.opacity = '1';
            flipOverlay.style.display = 'none';
            flipOverlay.innerHTML = '';
            currentImgIdx = nextImgIdx;
            isFlipping = false;
        }, 1000); // matches 1.0s flip transition
    }

    // Auto slide timing:
    // Pause = 1.0s, Page Turn = 1.0s. Total interval = 2.0s.
    setInterval(triggerPageTurn, 2000);
</script>
